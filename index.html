<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Noorast — Pre-Architecture Design Intelligence</title>
    <meta name="description" content="Know your site before you brief an architect. Planning constraints, legal conditions, site intelligence — all in one place. Free Property Passport & Planning AI." />

    <!-- ── Favicons (Google picks up the 32x32 PNG or SVG) ─────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <meta name="theme-color" content="#2d2d2d" />

    <!-- ── Open Graph / WhatsApp / Facebook ───────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.noorast.co.uk/" />
    <meta property="og:title" content="Noorast — Pre-Architecture Design Intelligence" />
    <meta property="og:description" content="Know your site before you brief an architect. Planning constraints, legal conditions, site intelligence — all in one place." />
    <meta property="og:image" content="https://www.noorast.co.uk/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Noorast" />
    <meta property="og:locale" content="en_GB" />

    <!-- ── Twitter / X ─────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://www.noorast.co.uk/" />
    <meta name="twitter:title" content="Noorast — Pre-Architecture Design Intelligence" />
    <meta name="twitter:description" content="Know your site before you brief an architect. Planning constraints, legal conditions, site intelligence — all in one place." />
    <meta name="twitter:image" content="https://www.noorast.co.uk/og-image.png" />

    <!-- ── SEO ──────────────────────────────────────────────────── -->
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Noorast" />
    <link rel="canonical" href="https://www.noorast.co.uk/" />
    <link rel="manifest" href="/site.webmanifest" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
      <form name="enquiry" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="location" />
      <select name="type"></select>
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
